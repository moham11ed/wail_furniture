<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول الإدارة | وائل شداد</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body data-admin-page="login">

  <main class="admin-login">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-mark">و</span>
        <div><strong>وائل شداد</strong><small>لوحة التحكم</small></div>
      </div>
      <h1>تسجيل الدخول</h1>
      <form id="login-form" class="contact-form" novalidate>
        <div>
          <label for="email">البريد الإلكتروني</label>
          <input type="email" id="email" name="email" placeholder="admin@example.com" required>
        </div>
        <div>
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">دخول</button>
        <p id="login-error" class="login-error" style="display:none"></p>
      </form>
      <a href="../index.html" class="back-link">→ العودة للموقع</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
