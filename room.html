<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المنتجات | متجر وائل شداد للأثاث</title>
  <meta name="robots" content="noindex">
  <script>
    // صفحة قديمة — تحويل تلقائي إلى products.html مع ترجمة باراميتر type القديم
    (function () {
      var p = new URLSearchParams(location.search);
      var out = new URLSearchParams();
      var map = { bedrooms: 'bedroom', 'kids-bedrooms': 'kids', 'living-room-set': 'living', niche: 'display' };
      var t = p.get('type');
      if (t) {
        if (['full_package', 'room_package', 'single_item'].indexOf(t) !== -1) out.set('type', t);
        else out.set('category', map[t] || t);
      }
      var qs = out.toString();
      location.replace('products.html' + (qs ? ('?' + qs) : ''));
    })();
  </script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:40px">جارٍ التحويل إلى <a href="products.html">صفحة المنتجات</a>…</p>
</body>
</html>
